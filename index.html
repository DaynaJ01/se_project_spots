<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="an interactive social media web application where users can add and remove photos"> 
    <meta name="author" content="Dayna Jones"> 
    <meta name="keywords" content="interactive, social media, photos"> 
    <title>Spots</title>
    <link rel="stylesheet" href="./pages/index.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
</head>
<body>
    <div class="page">
        <header class="header">
            <img src="./images/logo.svg" alt="Spot logo" class="header__logo">
        </header>
        <main class="content">
            <section class="profile page__section">
                <img src="./images/avatar.png" alt="Bessie Coleman" class="profile__avatar">
                <div class="profile__column">
                    <h1 class="profile__name">Bessie Coleman</h1>
                    <p class="profile__description">Civil Aviator</p>
                <button type="button" class="profile__edit-btn">
                    <img src="./images/pencils.svg" alt="pencil icon" class="profile__icon"/>Edit Profile
                </button>
                </div>
                <button type="button" class="profile__add-btn">
                    <img src="./images/add.svg" alt="add icon" class="profile__icon"/>New Post
                </button>

            </section>
            <section class="cards page__section">
                <ul class="cards__list">
                    <li class="card">
                        <img src="./images/vthorens.png" alt="Val Thorens" class="card__image">
                        <div class="card__content">
                            <h2 class="card__title">Val Thorens</h2>
                            <button type="button" class="card__like-btn"></button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/restaurant.png" alt="Restaurant Terrace" class="card__image">
                        <div class="card__content">
                            <h2 class="card__title">Restaurant terrace</h2>
                            <button type="button" class="card__like-btn"></button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/cafes.png" alt="An outdoor cafe" class="card__image">
                        <div class="card__content">
                            <h2 class="card__title">An outdoor cafe</h2>
                            <button type="button" class="card__like-btn"></button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/longbridge.png" alt="A very long bridge, over the forest..." class="card__image">
                        <div class="card__content">
                            <h2 class="card__title">A very long bridge, over the forest...</h2>
                            <button type="button" class="card__like-btn"></button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/tunnels.png" alt="Tunnel with morning light" class="card__image">
                        <div class="card__content">
                            <h2 class="card__title">Tunnel with morning light</h2>
                            <button type="button" class="card__like-btn"></button>
                        </div>
                    </li>
                    <li class="card">
                        <img src="./images/mountains.png" alt="Mountain house" class="card__image">
                        <div class="card__content">
                            <h2 class="card__title">Mountain house</h2>
                            <button type="button" class="card__like-btn"></button>
                        </div>
                    </li>
                </ul>
            </section>
            
        </main>
        <footer class="footer">
            <img src="./images/footer.png" alt="copyright" class="footer__copyright">
        </footer>
    </div>
</body>
</html>
